[paths]
input_h5ad = "../spatial_ot_input/p2_crc_cells_marker_genes_umap3d.h5ad"
output_dir = "../outputs/multilevel_deep_example"
feature_obsm_key = "X"
spatial_x_key = "cell_x"
spatial_y_key = "cell_y"
spatial_scale = 0.2737012522439323
allow_umap_as_feature = false

[ot]
n_clusters = 6
atoms_per_cluster = 6
radius_um = 100.0
stride_um = 120.0
basic_niche_size_um = 200.0
min_cells = 1
max_subregions = 0
lambda_x = 0.5
lambda_y = 1.0
geometry_eps = 0.03
ot_eps = 0.03
rho = 0.5
geometry_samples = 192
compressed_support_size = 96
align_iters = 4
allow_reflection = false
allow_scale = false
allow_convex_hull_fallback = true
max_iter = 10
tol = 1e-4
seed = 1337
compute_device = "auto"

[deep]
method = "graph_autoencoder"
latent_dim = 16
hidden_dim = 128
layers = 2
neighbor_k = 8
radius_um = 50.0
short_radius_um = 40.0
mid_radius_um = 120.0
graph_layers = 2
graph_aggr = "mean"
graph_max_neighbors = 64
full_batch_max_cells = 50000
epochs = 50
batch_size = 4096
learning_rate = 0.001
weight_decay = 0.0001
validation = "spatial_block"
validation_context_mode = "inductive"
device = "auto"
reconstruction_weight = 1.0
context_weight = 0.5
contrastive_weight = 0.1
variance_weight = 0.1
decorrelation_weight = 0.01
output_embedding = "context"
save_model = true
output_obsm_key = "X_spatial_ot_deep"
